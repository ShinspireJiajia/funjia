<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人員帳號清單｜Fun 嘉後台</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-theme.css" />
  <link rel="stylesheet" href="../css/admin-form.css" />
  <link rel="stylesheet" href="../css/admin-data-table.css" />
</head>
<body>
  <div class="adm-page">
    <h2 class="adm-page-title">人員帳號清單</h2>

    <div class="adm-card">
      <div class="adm-card__head"><i class="fa-solid fa-filter"></i> 篩選條件</div>
      <div class="adm-filter-grid">
        <div class="adm-field"><label>姓名 / Email</label><input type="text" id="fltKeyword" placeholder="輸入姓名或 Email" /></div>
        <div class="adm-field"><label>角色</label><select id="fltRole"><option value="">全部</option></select></div>
        <div class="adm-field"><label>狀態</label>
          <select id="fltStatus"><option value="">全部</option><option value="active">啟用</option><option value="disabled">已停用</option></select>
        </div>
      </div>
      <div class="adm-filter-actions"><button type="button" class="adm-btn" id="fltClearBtn">清除所有篩選</button></div>
    </div>

    <div class="adm-card">
      <div class="adm-list-head">
        <div class="adm-list-head__title"><h3>帳號清單</h3><div class="adm-list-head__stats" id="listStats"></div></div>
      </div>
      <div id="tableArea"></div>
    </div>

    <div class="adm-card">
      <div class="adm-card__head"><i class="fa-solid fa-user-plus"></i> 新增帳號</div>
      <div class="adm-filter-grid">
        <div class="adm-field"><label>姓名</label><input type="text" id="newName" placeholder="輸入姓名" /></div>
        <div class="adm-field"><label>Email</label><input type="email" id="newEmail" placeholder="name@funjia.tw" /></div>
        <div class="adm-field"><label>角色</label><select id="newRole"></select></div>
      </div>
      <div class="adm-filter-actions"><button type="button" class="adm-btn primary" id="addAccountBtn"><i class="fa-solid fa-plus"></i> 新增帳號</button></div>
    </div>
  </div>

  <script src="../js/admin/services/admin-account-service.js"></script>
  <script src="../js/admin/services/admin-audit-service.js"></script>
  <script src="../js/admin/pages/admin-accounts-page.js"></script>
</body>
</html>
