<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>兌換獎勵管理｜Fun 嘉後台</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-theme.css" />
  <link rel="stylesheet" href="../css/admin-form.css" />
  <link rel="stylesheet" href="../css/admin-data-table.css" />
</head>
<body>
  <div class="adm-page">
    <h2 class="adm-page-title">兌換獎勵管理</h2>

    <div class="adm-card">
      <div class="adm-list-head">
        <div class="adm-list-head__title">
          <h3>獎勵清單</h3>
          <div class="adm-list-head__stats" id="listStats"></div>
        </div>
        <div class="adm-list-head__tools">
          <button type="button" class="adm-btn primary" id="addRewardBtn"><i class="fa-solid fa-plus"></i> 新增獎勵</button>
        </div>
      </div>
      <div id="tableArea"></div>
    </div>

    <div class="adm-card" id="editCard" style="display:none;">
      <div class="adm-card__head"><i class="fa-solid fa-pen"></i> 編輯獎勵 — <span id="editingTitle"></span></div>
      <div class="adm-filter-grid">
        <div class="adm-field"><label>獎勵名稱</label><input type="text" id="editTitle" /></div>
        <div class="adm-field"><label>類型</label>
          <select id="editKind"><option value="coupon">優惠券</option><option value="gift">實體贈品</option></select>
        </div>
        <div class="adm-field"><label>所需點數</label><input type="number" id="editCost" /></div>
        <div class="adm-field"><label>庫存</label><input type="number" id="editStock" /></div>
      </div>
      <div class="adm-field" style="margin-top:12px;"><label>說明</label><textarea id="editDesc"></textarea></div>
      <div class="adm-filter-actions">
        <button type="button" class="adm-btn" id="saveOffBtn">儲存並下架</button>
        <button type="button" class="adm-btn primary" id="savePublishBtn">儲存並上架</button>
      </div>
    </div>

    <div class="adm-card">
      <div class="adm-card__head"><i class="fa-solid fa-ticket"></i> 兌換紀錄</div>
      <div id="redemptionArea"></div>
      <p class="adm-hint">示範階段僅記錄本裝置的兌換紀錄,正式上線需依會員帳號彙整全平台兌換數據。</p>
    </div>
  </div>

  <script src="../js/services/data-service.js"></script>
  <script src="../js/services/wallet-service.js"></script>
  <script src="../js/services/reward-service.js"></script>
  <script src="../js/admin/services/admin-account-service.js"></script>
  <script src="../js/admin/services/admin-audit-service.js"></script>
  <script src="../js/admin/pages/admin-campaign-rewards-page.js"></script>
</body>
</html>
