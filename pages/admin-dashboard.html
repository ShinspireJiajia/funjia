<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流量數據儀表板｜Fun 嘉後台</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-theme.css" />
  <link rel="stylesheet" href="../css/admin-form.css" />
  <link rel="stylesheet" href="../css/admin-data-table.css" />
  <link rel="stylesheet" href="../css/admin-stat-card.css" />
</head>
<body>
  <div class="adm-page">
    <h2 class="adm-page-title">流量數據儀表板</h2>
    <div class="adm-stat-row" id="statRow"></div>

    <div class="adm-grid-2">
      <div class="adm-card">
        <div class="adm-card__head"><i class="fa-solid fa-ranking-star"></i> 景點評分排行</div>
        <div id="rankArea"></div>
        <p class="adm-hint">以現有評分資料呈現,正式上線需接前台瀏覽/點擊事件追蹤才能反映真實熱度。</p>
      </div>
      <div class="adm-card">
        <div class="adm-card__head"><i class="fa-solid fa-gift"></i> 兌換獎勵排行</div>
        <div id="redemptionRankArea"></div>
      </div>
    </div>

    <div class="adm-card">
      <div class="adm-card__head"><i class="fa-solid fa-leaf"></i> 減碳點數異動趨勢(示範錢包最近紀錄)</div>
      <div id="walletTrendArea"></div>
      <p class="adm-hint">目前僅為單一裝置示範錢包的紀錄,正式上線需彙整全平台使用者的點數帳本。</p>
    </div>
  </div>

  <script src="../js/services/data-service.js"></script>
  <script src="../js/services/user-poi-service.js"></script>
  <script src="../js/services/poi-service.js"></script>
  <script src="../js/services/wallet-service.js"></script>
  <script src="../js/services/reward-service.js"></script>
  <script src="../js/admin/pages/admin-dashboard-page.js"></script>
</body>
</html>
