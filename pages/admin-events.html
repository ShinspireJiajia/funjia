<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>活動檔期管理｜Fun 嘉後台</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-theme.css" />
  <link rel="stylesheet" href="../css/admin-form.css" />
  <link rel="stylesheet" href="../css/admin-data-table.css" />
  <link rel="stylesheet" href="../css/admin-timeline-chart.css" />
</head>
<body>
  <div class="adm-page">
    <h2 class="adm-page-title">活動檔期管理</h2>

    <div class="adm-card">
      <div class="adm-card__head"><i class="fa-solid fa-timeline"></i> 檔期總覽</div>
      <div class="adm-timeline" id="timelineArea"></div>
      <div class="adm-tl-axis" id="timelineAxis"></div>
    </div>

    <div class="adm-card">
      <div class="adm-list-head">
        <div class="adm-list-head__title">
          <h3>檔期清單</h3>
          <div class="adm-list-head__stats" id="listStats"></div>
        </div>
        <div class="adm-list-head__tools">
          <a class="adm-btn" href="add-poi.html?type=events" target="_blank" rel="noopener"><i class="fa-solid fa-plus"></i> 新增檔期</a>
        </div>
      </div>
      <div id="tableArea"></div>
      <p class="adm-hint">「綁定優惠/徽章」依 deals.json、badges.json 中 refId 對應此活動的筆數自動統計。</p>
    </div>
  </div>

  <script src="../js/services/data-service.js"></script>
  <script src="../js/services/user-poi-service.js"></script>
  <script src="../js/services/poi-service.js"></script>
  <script src="../js/admin/services/admin-account-service.js"></script>
  <script src="../js/admin/services/admin-audit-service.js"></script>
  <script src="../js/admin/pages/admin-events-page.js"></script>
</body>
</html>
