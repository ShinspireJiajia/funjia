<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推薦行程範本｜Fun 嘉後台</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-theme.css" />
  <link rel="stylesheet" href="../css/admin-form.css" />
  <link rel="stylesheet" href="../css/admin-data-table.css" />
  <link rel="stylesheet" href="../css/admin-stop-planner.css" />
</head>
<body>
  <div class="adm-page">
    <h2 class="adm-page-title">推薦行程範本</h2>

    <div class="adm-card">
      <div class="adm-list-head">
        <div class="adm-list-head__title">
          <h3>行程範本清單</h3>
          <div class="adm-list-head__stats" id="listStats"></div>
        </div>
        <div class="adm-list-head__tools">
          <button type="button" class="adm-btn primary" id="addTemplateBtn"><i class="fa-solid fa-plus"></i> 新增行程範本</button>
        </div>
      </div>
      <div id="tableArea"></div>
    </div>

    <div class="adm-grid-2" id="editArea" style="display:none;">
      <div class="adm-card">
        <div class="adm-card__head"><i class="fa-solid fa-route"></i> 站點規劃 — <span id="editingTitle"></span></div>
        <div class="adm-filter-grid" style="margin-bottom:14px;">
          <div class="adm-field"><label>標題</label><input type="text" id="editTitle" /></div>
          <div class="adm-field"><label>天數</label><input type="number" min="1" max="7" id="editDays" /></div>
        </div>
        <div class="adm-field" style="margin-bottom:12px;"><label>行程簡介</label><textarea id="editSummary"></textarea></div>

        <label style="font-size:12.5px;color:var(--adm-text-muted);display:block;margin-bottom:8px;">站點順序</label>
        <div class="adm-stop-list" id="stopList"></div>
        <div class="adm-stop-add-row">
          <input type="text" id="newStopName" placeholder="站點名稱" />
          <input type="text" id="newStopNote" placeholder="備註(可選)" />
          <input type="text" id="newStopTransport" placeholder="交通資訊(可選)" />
          <button type="button" class="adm-btn" id="addStopBtn"><i class="fa-solid fa-plus"></i> 加入站點</button>
        </div>

        <div class="adm-filter-grid" style="margin-top:16px;">
          <div class="adm-field"><label>預估減碳量(kg)</label><input type="number" step="0.1" id="editCarbon" /></div>
          <div class="adm-field"><label>採用可得點數</label><input type="number" id="editPoints" /></div>
        </div>
        <p class="adm-hint">減碳量與點數為對外顯示數字,可依站點內容手動調整;智慧減碳排程功能仍以自身演算法即時計算,不受此設定影響。</p>

        <div class="adm-filter-actions">
          <button type="button" class="adm-btn" id="saveDraftBtn">儲存草稿</button>
          <button type="button" class="adm-btn primary" id="savePublishBtn">儲存並上架</button>
        </div>
      </div>

      <div class="adm-card">
        <div class="adm-card__head"><i class="fa-solid fa-comments"></i> 留言管理</div>
        <div id="commentArea"></div>
        <p class="adm-hint">刪除為不可回復的硬刪除,不當留言建議先於「操作紀錄」保留紀錄後再刪除,以利後續申訴查證。</p>
      </div>
    </div>
  </div>

  <script src="../js/services/data-service.js"></script>
  <script src="../js/services/itinerary-service.js"></script>
  <script src="../js/admin/services/admin-account-service.js"></script>
  <script src="../js/admin/services/admin-audit-service.js"></script>
  <script src="../js/admin/pages/admin-itineraries-page.js"></script>
</body>
</html>
