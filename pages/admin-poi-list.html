<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POI 資料庫清單｜Fun 嘉後台</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-theme.css" />
  <link rel="stylesheet" href="../css/admin-form.css" />
  <link rel="stylesheet" href="../css/admin-data-table.css" />
</head>
<body>
  <div class="adm-page">
    <h2 class="adm-page-title">POI 資料庫清單</h2>

    <div class="adm-card">
      <div class="adm-card__head"><i class="fa-solid fa-filter"></i> 篩選條件</div>
      <div class="adm-filter-grid">
        <div class="adm-field">
          <label>名稱關鍵字</label>
          <input type="text" id="fltKeyword" placeholder="例如 阿里山國家森林遊樂區" />
        </div>
        <div class="adm-field">
          <label>類型</label>
          <select id="fltType">
            <option value="">全部</option>
            <option value="attractions">景點</option>
            <option value="shops">店家</option>
            <option value="lodging">住宿</option>
          </select>
        </div>
        <div class="adm-field">
          <label>來源</label>
          <select id="fltSource">
            <option value="">全部</option>
            <option value="official">官方</option>
            <option value="ugc">使用者投稿</option>
          </select>
        </div>
        <div class="adm-field">
          <label>狀態</label>
          <select id="fltStatus">
            <option value="">全部</option>
            <option value="published">已上架</option>
            <option value="archived">已下架</option>
          </select>
        </div>
      </div>
      <div class="adm-filter-actions">
        <button type="button" class="adm-btn" id="fltClearBtn">清除所有篩選</button>
      </div>
    </div>

    <div class="adm-card">
      <div class="adm-list-head">
        <div class="adm-list-head__title">
          <h3>POI 清單</h3>
          <div class="adm-list-head__stats" id="listStats"></div>
        </div>
        <div class="adm-list-head__tools">
          <a class="adm-btn" href="add-poi.html?type=attractions" target="_blank" rel="noopener">
            <i class="fa-solid fa-plus"></i> 新增 POI
          </a>
        </div>
      </div>
      <div id="tableArea"></div>
    </div>
  </div>

  <script src="../js/services/data-service.js"></script>
  <script src="../js/services/user-poi-service.js"></script>
  <script src="../js/services/poi-service.js"></script>
  <script src="../js/admin/services/admin-account-service.js"></script>
  <script src="../js/admin/services/admin-audit-service.js"></script>
  <script src="../js/admin/pages/admin-poi-list-page.js"></script>
</body>
</html>
