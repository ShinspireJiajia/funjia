<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>使用者投稿審核｜Fun 嘉後台</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-theme.css" />
  <link rel="stylesheet" href="../css/admin-form.css" />
  <link rel="stylesheet" href="../css/admin-data-table.css" />
</head>
<body>
  <div class="adm-page">
    <h2 class="adm-page-title">使用者投稿審核</h2>

    <div class="adm-card">
      <div class="adm-list-head">
        <div class="adm-list-head__title">
          <h3>投稿佇列</h3>
          <div class="adm-list-head__stats" id="listStats"></div>
        </div>
      </div>
      <div id="tableArea"></div>
      <p class="adm-hint">
        「通過」僅代表已審閱確認,投稿內容目前即為即時公開顯示;「退件」會直接移除該筆投稿,並會提示使用者填寫的退件原因(demo 階段以瀏覽器提示框輸入,正式上線需改為系統通知使用者)。
      </p>
    </div>
  </div>

  <script src="../js/services/data-service.js"></script>
  <script src="../js/services/user-poi-service.js"></script>
  <script src="../js/services/poi-service.js"></script>
  <script src="../js/admin/services/admin-account-service.js"></script>
  <script src="../js/admin/services/admin-audit-service.js"></script>
  <script src="../js/admin/pages/admin-poi-submissions-page.js"></script>
</body>
</html>
