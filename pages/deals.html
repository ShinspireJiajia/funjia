<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>好康專區｜Fun 嘉</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style-base.css" />
  <link rel="stylesheet" href="../css/a11y.css" />
  <script src="../js/core/i18n-core.js"></script>
  <script src="../js/core/a11y-init.js"></script>
  <link rel="stylesheet" href="../css/page-header.css" />
  <link rel="stylesheet" href="../css/deal-card.css" />
  <link rel="stylesheet" href="../css/deals.css" />
  <link rel="stylesheet" href="../css/mission-grid.css" />
</head>
<body>
  <header class="page-header">
    <button class="page-header__back" onclick="history.back()" aria-label="返回"><i class="fa-solid fa-arrow-left"></i></button>
    <h1 id="dealsTitle">好康專區</h1>
  </header>

  <div class="deals-page">
    <div class="deals-tabs" id="dealsTabs">
      <button type="button" class="deals-tab" data-kind="coupon">優惠</button>
      <button type="button" class="deals-tab" data-kind="event">活動資訊</button>
      <button type="button" class="deals-tab" data-kind="mission">任務</button>
    </div>
    <div id="dealsList"></div>
    <div id="missionGrid" hidden></div>
  </div>

  <script src="../js/services/data-service.js"></script>
  <script src="../js/services/deal-service.js"></script>
  <script src="../js/services/wallet-service.js"></script>
  <script src="../js/services/mission-service.js"></script>
  <script src="../js/components/deal-card.js"></script>
  <script src="../js/components/mission-grid.js"></script>
  <script src="../js/pages/deals-page.js"></script>
</body>
</html>
