<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>優惠商城｜Fun 嘉</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style-base.css" />
  <link rel="stylesheet" href="../css/a11y.css" />
  <script src="../js/core/i18n-core.js"></script>
  <script src="../js/core/a11y-init.js"></script>
  <link rel="stylesheet" href="../css/page-header.css" />
  <link rel="stylesheet" href="../css/reward-card.css" />
  <link rel="stylesheet" href="../css/rewards-mall.css" />
</head>
<body>
  <header class="page-header">
    <button class="page-header__back" onclick="history.back()" aria-label="返回"><i class="fa-solid fa-arrow-left"></i></button>
    <h1 data-i18n="pageTitle.rewardsMall">優惠商城</h1>
  </header>

  <div class="rewards-page">
    <a class="rewards-balance-bar" href="carbon-wallet.html">
      <span><i class="fa-solid fa-leaf"></i> 我的減碳點數</span>
      <strong id="rewardsBalance">0 點</strong>
    </a>

    <div class="deals-tabs" id="rewardsTabs">
      <button type="button" class="deals-tab is-active" data-kind="coupon">折價券</button>
      <button type="button" class="deals-tab" data-kind="gift">兌換好禮</button>
    </div>

    <div id="rewardsResult" class="rewards-result"></div>

    <div id="rewardsList"></div>

    <h2 class="section-title-plain">我的兌換紀錄</h2>
    <div id="redemptionsList"></div>
  </div>

  <script src="../js/services/data-service.js"></script>
  <script src="../js/services/wallet-service.js"></script>
  <script src="../js/services/reward-service.js"></script>
  <script src="../js/components/reward-card.js"></script>
  <script src="../js/pages/rewards-mall-page.js"></script>
</body>
</html>
